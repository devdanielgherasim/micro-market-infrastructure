image: alpine:latest

stages:
  - plan
  - apply

before_script:
  - apk add --no-cache curl unzip bash
  - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.7.2/terraform_1.7.2_linux_amd64.zip
  - unzip terraform.zip -d tmp && mv tmp/terraform /usr/local/bin/
  - terraform version
  - export TF_ROOT="terraform/environments/azure/dev"
  - cd $TF_ROOT
  - export TF_VAR_client_id=$ARM_CLIENT_ID
  - export TF_VAR_tenant_id=$ARM_TENANT_ID
  - export TF_VAR_subscription_id=$ARM_SUBSCRIPTION_ID
  - terraform init -input=false

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - terraform/environments/azure/dev/tfplan

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  only:
    - dev
