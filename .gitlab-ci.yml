image: alpine:latest


stages:
  - validate
  - plan
  - apply

variables:
  TF_DEV_ROOT: "terraform/environments/azure/dev"
  TF_PROD_ROOT: "terraform/environments/azure/prod"

before_script:
  - apk add --no-cache bash curl unzip
  - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.7.2/terraform_1.7.2_linux_amd64.zip
  - unzip -o terraform.zip
  - mv terraform /usr/local/bin/
  - terraform version
  - |
    if [[ "$CI_COMMIT_REF_NAME" == "prod" ]]; then
      export TF_ROOT=$TF_PROD_ROOT
      export ARM_SUBSCRIPTION_ID=$PROD_ARM_SUBSCRIPTION_ID
    else
      export TF_ROOT=$TF_DEV_ROOT
      export ARM_SUBSCRIPTION_ID=$DEV_ARM_SUBSCRIPTION_ID
    fi
  - cd $TF_ROOT
  - terraform init -input=false



validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  only:
    - dev
    - prod
