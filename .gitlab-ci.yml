include:
  - template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: validate

image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.terraform.d/plugin-cache"
  CLOUD_PROVIDER: ${CLOUD_PROVIDER:-aws}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_TF_STATE_BUCKET: ${AWS_TF_STATE_BUCKET:-terraform-microservices1691715-state}

.terraform-cache: &terraform-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-${CLOUD_PROVIDER}
    paths:
      - terraform/${CLOUD_PROVIDER}/.terraform
      - terraform/kubernetes/.terraform
      - .terraform.d/plugin-cache
    policy: pull-push

.before_script_common: &before_script_common
  - 'echo "=== [DEBUG] Pipeline started for job: $CI_JOB_NAME in stage: $CI_JOB_STAGE ==="'
  - 'echo "=== [DEBUG] Running on runner: $CI_RUNNER_DESCRIPTION ==="'
  - 'echo "=== [DEBUG] Cloud provider: ${CLOUD_PROVIDER} ==="'
  - 'echo "=== [DEBUG] Project directory: $CI_PROJECT_DIR ==="'
  - 'echo "=== [DEBUG] Creating plugin cache directory: $TF_PLUGIN_CACHE_DIR ==="'
  - mkdir -p $TF_PLUGIN_CACHE_DIR
  - WORKSPACE=$(echo ${CI_COMMIT_REF_NAME} | tr -cd '[:alnum:]-' | tr '[:upper:]' '[:lower:]')
  - 'echo "=== [DEBUG] Using workspace: $WORKSPACE derived from branch: ${CI_COMMIT_REF_NAME} ==="'
  - 'echo "=== [DEBUG] Setting up provider-specific environment variables ==="'
  - |
    # Set up provider-specific environment variables
    if [ "${CLOUD_PROVIDER}" = "aws" ]; then
      echo "=== [DEBUG] Configuring AWS provider ==="
      if [ -n "${AWS_ROLE_ARN:-}" ]; then
        echo "=== [DEBUG] Assuming AWS role through GitLab OIDC ==="
        apk add --no-cache aws-cli jq
        CREDS=$(aws sts assume-role-with-web-identity \
          --role-arn "${AWS_ROLE_ARN}" \
          --role-session-name "gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" \
          --web-identity-token "${GITLAB_OIDC_TOKEN}" \
          --duration-seconds 3600)
        export AWS_ACCESS_KEY_ID=$(echo "${CREDS}" | jq -r '.Credentials.AccessKeyId')
        export AWS_SECRET_ACCESS_KEY=$(echo "${CREDS}" | jq -r '.Credentials.SecretAccessKey')
        export AWS_SESSION_TOKEN=$(echo "${CREDS}" | jq -r '.Credentials.SessionToken')
      fi
      export AWS_REGION="${AWS_REGION}"
      export AWS_DEFAULT_REGION="${AWS_REGION}"
      export TF_VAR_region="${AWS_REGION}"
      export TF_BACKEND_ARGS="-backend-config=bucket=${AWS_TF_STATE_BUCKET} -backend-config=key=aws/${WORKSPACE}/terraform.tfstate -backend-config=region=${AWS_REGION} -backend-config=use_lockfile=true"
      echo "=== [DEBUG] AWS environment and backend variables set ==="
    elif [ "${CLOUD_PROVIDER}" = "azure" ]; then
      echo "=== [DEBUG] Configuring Azure provider ==="
      export TF_VAR_client_id=$ARM_CLIENT_ID
      export TF_VAR_client_secret=$ARM_CLIENT_SECRET
      export TF_VAR_tenant_id=$ARM_TENANT_ID
      export TF_VAR_subscription_id=$ARM_SUBSCRIPTION_ID
      export TF_BACKEND_ARGS=""
      echo "=== [DEBUG] Azure environment variables set ==="
    elif [ "${CLOUD_PROVIDER}" = "gcp" ]; then
      echo "=== [DEBUG] Configuring GCP provider ==="
      echo "$GCP_SERVICE_ACCOUNT_KEY" > gcp-credentials.json
      export GOOGLE_APPLICATION_CREDENTIALS="$CI_PROJECT_DIR/gcp-credentials.json"
      export TF_VAR_credentials_file="$CI_PROJECT_DIR/gcp-credentials.json"
      export TF_VAR_project_id=$GCP_PROJECT_ID
      export TF_BACKEND_ARGS=""
      echo "=== [DEBUG] GCP environment variables set ==="
      echo "=== [DEBUG] GCP credentials file created at: $GOOGLE_APPLICATION_CREDENTIALS ==="
    else
      echo "=== [DEBUG] ERROR: Unsupported cloud provider: ${CLOUD_PROVIDER}. Must be one of: aws, azure, gcp ==="
      exit 1
    fi
  - 'echo "=== [DEBUG] Common before_script completed ==="'

validate_infrastructure:
  stage: validate
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/${CLOUD_PROVIDER}
    - 'echo "=== [DEBUG] Changed directory to $(pwd) ==="'
  script:
    - 'echo "=== [DEBUG] Starting terraform init ==="'
    - terraform init ${TF_BACKEND_ARGS}
    - 'echo "=== [DEBUG] Terraform init completed ==="'
    - 'echo "=== [DEBUG] Starting terraform validate ==="'
    - terraform validate
    - 'echo "=== [DEBUG] Terraform validate completed ==="'
    - 'echo "=== [DEBUG] Starting terraform fmt check ==="'
    - terraform fmt -check -diff
    - 'echo "=== [DEBUG] Terraform fmt check completed ==="'
    - 'echo "=== [DEBUG] Validate infrastructure job completed successfully ==="'

plan_infrastructure:
  stage: plan
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/${CLOUD_PROVIDER}
    - 'echo "=== [DEBUG] Changed directory to $(pwd) ==="'
  script:
    - 'echo "=== [DEBUG] Starting terraform init ==="'
    - terraform init ${TF_BACKEND_ARGS}
    - 'echo "=== [DEBUG] Terraform init completed ==="'
    - 'echo "=== [DEBUG] Setting up terraform workspace ==="'
    - |
      if ! terraform workspace list | grep -q "$WORKSPACE"; then
        echo "=== [DEBUG] Creating new workspace: $WORKSPACE ==="
        terraform workspace new "$WORKSPACE"
      else
        echo "=== [DEBUG] Workspace $WORKSPACE already exists ==="
      fi
      echo "=== [DEBUG] Selecting workspace: $WORKSPACE ==="
      terraform workspace select "$WORKSPACE"
      echo "=== [DEBUG] Current workspace: $(terraform workspace show) ==="
    - 'echo "=== [DEBUG] Starting terraform plan ==="'
    - terraform plan --var-file=./tfvars_files/$WORKSPACE.tfvars -var project_name="$PROJECT_NAMESPACE" -out=tfplan
    - 'echo "=== [DEBUG] Terraform plan completed ==="'
    - 'echo "=== [DEBUG] Converting plan to JSON ==="'
    - terraform show -json tfplan > plan.json
    - 'echo "=== [DEBUG] Plan infrastructure job completed successfully ==="'
  artifacts:
    paths:
      - terraform/${CLOUD_PROVIDER}/tfplan
      - terraform/${CLOUD_PROVIDER}/plan.json
    reports:
      terraform: terraform/${CLOUD_PROVIDER}/plan.json
    expire_in: 1 week

apply_infrastructure:
  stage: apply
  <<: *terraform-cache
  when: manual
  before_script:
    - *before_script_common
    - cd terraform/${CLOUD_PROVIDER}
    - 'echo "=== [DEBUG] Changed directory to $(pwd) ==="'
  script:
    - 'echo "=== [DEBUG] Starting terraform init ==="'
    - terraform init ${TF_BACKEND_ARGS}
    - 'echo "=== [DEBUG] Terraform init completed ==="'
    - 'echo "=== [DEBUG] Setting up terraform workspace ==="'
    - |
      if ! terraform workspace list | grep -q "$WORKSPACE"; then
        echo "=== [DEBUG] Creating new workspace: $WORKSPACE ==="
        terraform workspace new "$WORKSPACE"
      else
        echo "=== [DEBUG] Selecting workspace: $WORKSPACE ==="
        terraform workspace select "$WORKSPACE"
      fi
      echo "=== [DEBUG] Current workspace: $(terraform workspace show) ==="
    - 'echo "=== [DEBUG] Starting terraform apply ==="'
    - terraform apply -auto-approve tfplan
    - 'echo "=== [DEBUG] Terraform apply completed successfully ==="'
    - 'echo "=== [DEBUG] Infrastructure deployment completed for provider: ${CLOUD_PROVIDER} ==="'
  dependencies:
    - plan_infrastructure
  needs: [ plan_infrastructure ]

destroy_infrastructure:
  stage: destroy
  <<: *terraform-cache
  when: manual
  before_script:
    - *before_script_common
    - cd terraform/${CLOUD_PROVIDER}
    - 'echo "=== [DEBUG] Changed directory to $(pwd) ==="'
  script:
    - 'echo "=== [DEBUG] Starting terraform init ==="'
    - terraform init ${TF_BACKEND_ARGS}
    - 'echo "=== [DEBUG] Terraform init completed ==="'
    - 'echo "=== [DEBUG] Setting up terraform workspace ==="'
    - |
      if ! terraform workspace list | grep -q "$WORKSPACE"; then
        echo "=== [DEBUG] Error: Workspace $WORKSPACE does not exist. Cannot destroy non-existent workspace. ==="
        exit 1
      else
        echo "=== [DEBUG] Selecting workspace: $WORKSPACE ==="
        terraform workspace select "$WORKSPACE"
      fi
      echo "=== [DEBUG] Current workspace: $(terraform workspace show) ==="
    - 'echo "=== [DEBUG] Starting terraform destroy ==="'
    - terraform destroy -auto-approve --var-file=./tfvars_files/$WORKSPACE.tfvars
    - 'echo "=== [DEBUG] Terraform destroy completed successfully ==="'
    - 'echo "=== [DEBUG] Infrastructure destroyed for provider: ${CLOUD_PROVIDER} ==="'
