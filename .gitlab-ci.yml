image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

# Multi-Stage GitLab CI/CD for Azure + Kubernetes Terraform
# This pipeline ensures Azure infrastructure is deployed before Kubernetes addons.
# It uses two separate Terraform projects and remote state for dependency management.

stages:
  - validate
  - azure
  - kubernetes

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.terraform.d/plugin-cache"

.terraform-cache: &terraform-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - terraform/azure/.terraform
      - terraform/kubernetes/.terraform
      - .terraform.d/plugin-cache
    policy: pull-push

.before_script_common: &before_script_common
  - echo "Starting job in $CI_JOB_STAGE stage"
  - export TF_VAR_client_id=$ARM_CLIENT_ID
  - export TF_VAR_client_secret=$ARM_CLIENT_SECRET
  - export TF_VAR_tenant_id=$ARM_TENANT_ID
  - export TF_VAR_subscription_id=$ARM_SUBSCRIPTION_ID

validate_azure:
  stage: validate
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/azure
  script:
    - terraform init -reconfigure
    - terraform validate
    - terraform fmt -check -diff

validate_kubernetes:
  stage: validate
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/kubernetes
  script:
    - terraform init -reconfigure
    - terraform validate
    - terraform fmt -check -diff
  needs: [ validate_azure ]

plan_azure:
  stage: azure
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/azure
  script:
    - terraform init
    - terraform plan --var-file=../tfvars_files/dev.tfvars -out=tfplan
    - terraform show -json tfplan > plan.json
  artifacts:
    paths:
      - terraform/azure/tfplan
      - terraform/azure/plan.json
    reports:
      terraform: terraform/azure/plan.json

apply_azure:
  stage: azure
  <<: *terraform-cache
  before_script:
    - *before_script_common
    - cd terraform/azure
  script:
    - terraform init
    - terraform apply -auto-approve tfplan
    - PUBLIC_IP_NAME=$(az network public-ip list --resource-group rg-microservices1691715-dev-aks --query "[?contains(name, 'kubernetes-')].name" -o tsv)
    - az network public-ip update --resource-group rg-$CI_PROJECT_NAMESPACE-dev-aks --name $PUBLIC_IP_NAME --dns-name $CI_PROJECT_NAMESPACE
  dependencies:
    - plan_azure
  needs: [ plan_azure ]
