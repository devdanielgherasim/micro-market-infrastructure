global:
  image:
    repository: quay.io/argoproj/argocd
#    tag: v2.10.2
  domain: "${DOMAIN}"

redis:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  externalConfig: false
  existingSecret: false
  createSecret: true
  secretName: "argocd-redis"

configs:
  cm:
    admin.enabled: true
    timeout.reconciliation: 180s
    application.instanceLabelKey: argocd.argoproj.io/instance
    url: "${ARGOCD_URL}"
    oidc.config: |
      name: Keycloak
      issuer: "${KEYCLOAK_ISSUER}"
      clientID: argocd
      clientSecret: $argo-oidc-client-secret
      requestedScopes: ["openid", "profile", "email"]
      insecureSkipVerify: true
    # Add resource customizations for ignoring resource updates
    resource.customizations.ignoreResourceUpdates.all: |
      jsonPointers:
        - /status
    resource.customizations.ignoreResourceUpdates.argoproj.io_Application: |
      jqPathExpressions:
        - '.metadata.annotations."notified.notifications.argoproj.io"'
        - '.metadata.annotations."argocd.argoproj.io/refresh"'
        - '.metadata.annotations."argocd.argoproj.io/hydrate"'
        - '.operation'
    resource.customizations.ignoreResourceUpdates.argoproj.io_Rollout: |
      jqPathExpressions:
        - '.metadata.annotations."notified.notifications.argoproj.io"'
    resource.customizations.ignoreResourceUpdates.autoscaling_HorizontalPodAutoscaler: |
      jqPathExpressions:
        - '.metadata.annotations."autoscaling.alpha.kubernetes.io/behavior"'
        - '.metadata.annotations."autoscaling.alpha.kubernetes.io/conditions"'
        - '.metadata.annotations."autoscaling.alpha.kubernetes.io/metrics"'
        - '.metadata.annotations."autoscaling.alpha.kubernetes.io/current-metrics"'
    resource.customizations.ignoreResourceUpdates.ConfigMap: |
      jqPathExpressions:
        - '.metadata.annotations."cluster-autoscaler.kubernetes.io/last-updated"'
        - '.metadata.annotations."control-plane.alpha.kubernetes.io/leader"'
    resource.customizations.ignoreResourceUpdates.apps_ReplicaSet: |
      jqPathExpressions:
        - '.metadata.annotations."deployment.kubernetes.io/desired-replicas"'
        - '.metadata.annotations."deployment.kubernetes.io/max-replicas"'
        - '.metadata.annotations."rollout.argoproj.io/desired-replicas"'
    resource.customizations.ignoreResourceUpdates.discovery.k8s.io_EndpointSlice: |
      jsonPointers:
        - /metadata
        - /endpoints
        - /ports
    resource.customizations.ignoreResourceUpdates.Endpoints: |
      jsonPointers:
        - /metadata
        - /subsets
    # Resource exclusions
    resource.exclusions: |
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest

  params:
    server.insecure: false
    server.basehref: /argocd
    server.rootpath: /argocd
    server.staticassets: /argocd
    # Add controller parameters
    controller.status.processors: 20
    controller.operation.processors: 10
    controller.self.heal.timeout.seconds: 5
    controller.repo.server.timeout.seconds: 60
    controller.sync.timeout.seconds: 0
    # Add reposerver parameters
    reposerver.parallelism.limit: 0
    # Add applicationset parameters
    applicationsetcontroller.policy: sync
    applicationsetcontroller.enable.progressive.syncs: false

  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:org-admin, applications, *, */*, allow
      p, role:org-admin, clusters, get, *, allow
      p, role:org-admin, repositories, *, *, allow
      p, role:org-admin, projects, *, *, allow
      g, admin, role:org-admin
    scopes: "[groups]"
    policy.matchMode: "glob"

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  certificate:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: "nginx"
    path: /argocd
    pathType: Prefix
    hostname: "${DOMAIN}"
    https: true
    tls:
      - hosts:
          - "${DOMAIN}"
        secretName: argocd-server-tls
    hosts:
      - "${DOMAIN}"
    annotations:
      cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER}"
      acme.cert-manager.io/http01-edit-in-place: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  # Add dynamic cluster distribution
  dynamicClusterDistribution: false
  heartbeatTime: 10

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  # Add repo server parameters
  containerPorts:
    server: 8081
    metrics: 8084

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  # Add applicationSet parameters
  metrics:
    enabled: false
  containerPorts:
    metrics: 8080
    probe: 8081
    webhook: 7000

# Enable notifications controller
notifications:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

# Disable dex as we're using OIDC with Keycloak
dex:
  enabled: false
