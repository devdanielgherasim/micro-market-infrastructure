apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alerting-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
  - name: kubernetes-apps
    rules:
    - alert: KubePodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{job="kube-state-metrics"}[15m]) * 60 * 5 > 0
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: Pod is crash looping
        description: Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping ({{ $value }} restarts in the last 15 minutes)
    - alert: KubePodNotReady
      expr: sum by (namespace, pod) (max by(namespace, pod) (kube_pod_status_phase{job="kube-state-metrics", phase=~"Pending|Unknown"}) * on(namespace, pod) group_left(owner_kind) topk by(namespace, pod) (1, max by(namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"}))) > 0
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: Pod has been in a non-ready state for more than 15 minutes
        description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for more than 15 minutes
  - name: kubernetes-resources
    rules:
    - alert: KubeCPUOvercommit
      expr: sum(namespace:container_cpu_usage_seconds_total:sum_rate) / sum(kube_node_status_allocatable{resource="cpu"}) > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Cluster has overcommitted CPU resources
        description: Cluster has overcommitted CPU resources. Consider adding more nodes.