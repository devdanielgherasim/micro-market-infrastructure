prometheus:
  prometheusSpec:
    retention: "7d"
    evaluationInterval: "60s"
    scrapeInterval: "60s"
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    walCompression: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "managed-csi"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
    replicas: 1

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "managed-csi"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
    replicas: 1
    retention: 72h
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'slack-notifications'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-notifications'
          group_wait: 1m
          continue: true
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
                *Details:*
                {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                {{ end }}
              {{ end }}

grafana:
  grafana.ini:
    server:
      serve_from_sub_path: true
    auth:
      disable_login_form: false
      oauth_auto_login: false
    security:
      cookie_secure: true
    users:
      allow_sign_up: false
      auto_assign_org: true
      auto_assign_org_role: Viewer
    analytics:
      reporting_enabled: false
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://${DOMAIN}/auth/realms/microservices/protocol/openid-connect/auth
      token_url: https://${DOMAIN}/auth/realms/microservices/protocol/openid-connect/token
      api_url: https://${DOMAIN}/auth/realms/microservices/protocol/openid-connect/userinfo
      role_attribute_path: contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'
  persistence:
    enabled: true
    storageClassName: "managed-csi"
    size: 1Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        - name: 'kubernetes'
          orgId: 1
          folder: 'Kubernetes'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus
    kubernetes:
      k8s-views-global:
        gnetId: 15757
        revision: 1
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15760
        revision: 1
        datasource: Prometheus

defaultRules:
  create: true
  rules:
    alertmanager: true
    general: true
    k8s: true
    kubeApiserver: true
    kubernetesApps: true
    kubernetesResources: true
    node: true
    prometheus: true
  disabled:
    KubeControllerManagerDown: true
    KubeSchedulerDown: true

nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"

prometheusOperator:
  enabled: true
  manageCrds: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
