name: Terraform cloud backend setup
description: >-
  Assumes cloud credentials for the selected provider via GitHub-native OIDC
  (aws-actions/configure-aws-credentials for AWS, ARM_* env vars for Azure
  since the azurerm provider reads GitHub Actions OIDC natively, Workload
  Identity Federation for GCP) and computes the terraform init
  -backend-config args and workspace name for that provider/environment.
  Cloud login only succeeds once the corresponding secrets/vars are configured
  on the repo; until then the guard clauses below fail fast with a clear
  message instead of silently proceeding with empty credentials.
inputs:
  cloud_provider:
    description: One of aws, azure, gcp
    required: true
  environment:
    description: Terraform workspace / environment name (dev, staging, prod)
    required: true
outputs:
  backend_args:
    description: Space-separated -backend-config=... args for `terraform init`
    value: ${{ steps.compute.outputs.backend_args }}
  workspace:
    description: Resolved terraform workspace name
    value: ${{ steps.compute.outputs.workspace }}
runs:
  using: composite
  steps:
    - name: Assume AWS role via GitHub OIDC
      if: inputs.cloud_provider == 'aws'
      uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Authenticate to GCP via Workload Identity Federation
      if: inputs.cloud_provider == 'gcp'
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
      with:
        workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

    # Azure needs no equivalent login step here: with ARM_USE_OIDC=true and
    # `permissions: id-token: write` on the calling job, the azurerm provider
    # itself exchanges the runner's ACTIONS_ID_TOKEN_REQUEST_* env vars for a
    # federated token at terraform-init time - no azure/login action needed.

    - name: Compute backend args and workspace
      id: compute
      shell: bash
      env:
        CLOUD_PROVIDER: ${{ inputs.cloud_provider }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -eu
        WORKSPACE="${ENVIRONMENT:-dev}"

        case "${CLOUD_PROVIDER}" in
          aws)
            : "${AWS_REGION:?Set AWS_REGION (repo variable)}"
            : "${AWS_TF_STATE_BUCKET:?Set AWS_TF_STATE_BUCKET (repo variable)}"
            BACKEND_ARGS="-backend-config=bucket=${AWS_TF_STATE_BUCKET} -backend-config=key=aws/${WORKSPACE}/terraform.tfstate -backend-config=region=${AWS_REGION} -backend-config=use_lockfile=true"
            echo "TF_VAR_region=${AWS_REGION}" >> "${GITHUB_ENV}"
            echo "TF_VAR_ci_role_arn=${AWS_ROLE_ARN:-}" >> "${GITHUB_ENV}"
            ;;
          azure)
            : "${ARM_CLIENT_ID:?Set ARM_CLIENT_ID secret (Azure federated identity client ID)}"
            : "${ARM_TENANT_ID:?Set ARM_TENANT_ID secret}"
            : "${ARM_SUBSCRIPTION_ID:?Set ARM_SUBSCRIPTION_ID secret}"
            RESOURCE_GROUP="${AZURE_TF_STATE_RESOURCE_GROUP:-rg-infrastructure}"
            CONTAINER="${AZURE_TF_STATE_CONTAINER:-tfstate}"
            STORAGE_ACCOUNT="${AZURE_TF_STATE_STORAGE_ACCOUNT:-}"
            if [ -z "${STORAGE_ACCOUNT}" ]; then
              SUB_PART="$(printf '%s' "${ARM_SUBSCRIPTION_ID}" | tr -d '-' | tr '[:upper:]' '[:lower:]' | cut -c1-12)"
              ENV_PART="$(printf '%s' "${WORKSPACE}" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]' | cut -c1-5)"
              STORAGE_ACCOUNT="tfstate${SUB_PART}${ENV_PART}"
            fi
            BACKEND_ARGS="-backend-config=resource_group_name=${RESOURCE_GROUP} -backend-config=storage_account_name=${STORAGE_ACCOUNT} -backend-config=container_name=${CONTAINER} -backend-config=key=terraform.tfstate"
            echo "TF_VAR_client_id=${ARM_CLIENT_ID}" >> "${GITHUB_ENV}"
            echo "TF_VAR_tenant_id=${ARM_TENANT_ID}" >> "${GITHUB_ENV}"
            echo "TF_VAR_subscription_id=${ARM_SUBSCRIPTION_ID}" >> "${GITHUB_ENV}"
            ;;
          gcp)
            : "${GCP_PROJECT_ID:?Set GCP_PROJECT_ID secret}"
            : "${GCP_TF_STATE_BUCKET:?Set GCP_TF_STATE_BUCKET (repo variable)}"
            BACKEND_ARGS="-backend-config=bucket=${GCP_TF_STATE_BUCKET} -backend-config=prefix=terraform/environments/${WORKSPACE}/state"
            echo "TF_VAR_project_id=${GCP_PROJECT_ID}" >> "${GITHUB_ENV}"
            ;;
          *)
            echo "Unsupported cloud provider: ${CLOUD_PROVIDER}. Must be one of: aws, azure, gcp" >&2
            exit 1
            ;;
        esac

        echo "backend_args=${BACKEND_ARGS}" >> "${GITHUB_OUTPUT}"
        echo "workspace=${WORKSPACE}" >> "${GITHUB_OUTPUT}"
