name: Infrastructure CI

# Security and static Terraform checks run on every push/PR. The remote-backend
# Terraform lifecycle jobs stay manual because they need cloud OIDC credentials
# and intentionally target a selected cloud/environment.

on:
  pull_request:
    paths:
      - terraform/**
      - .checkov.yaml
      - .github/workflows/ci.yml
      - .github/actions/terraform-cloud-setup/**
  push:
    branches:
      - main
    paths:
      - terraform/**
      - .checkov.yaml
      - .github/workflows/ci.yml
      - .github/actions/terraform-cloud-setup/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', vars.CLOUD_PROVIDER || 'aws', vars.ENVIRONMENT || 'dev') || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VERSION: "1.12.x"
  CLOUD_PROVIDER: ${{ vars.CLOUD_PROVIDER || 'aws' }}
  TARGET_ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
  PROJECT_NAMESPACE: ${{ vars.PROJECT_NAMESPACE || 'danielgherasim-microservices' }}
  TERRAFORM_OPERATION: ${{ vars.TERRAFORM_OPERATION || 'apply' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  AWS_TF_STATE_BUCKET: ${{ vars.AWS_TF_STATE_BUCKET || 'terraform-microservices1691715-state' }}
  GCP_TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET || 'terraformmicroservicesstate' }}

jobs:
  security-scan-gate:
    name: Security scan gate
    # Pinned from main on 2026-07-09.
    uses: devdanielgherasim/micro-market-utilities/.github/workflows/security-scan-gate.yml@30fc11173bdcd8dc9d6f0291c00633005a75f2df
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    with:
      codeql-languages: actions

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Scan Terraform roots
        run: |
          set -eu
          docker run --rm \
            -v "${PWD}:/work" \
            -w /work \
            bridgecrew/checkov:3.3.7 \
            -d terraform/ \
            --config-file .checkov.yaml \
            --compact \
            --quiet

  terraform-validate-static:
    name: Terraform validate (static)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cloud_provider:
          - aws
          - azure
          - gcp
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init without backend
        working-directory: terraform/${{ matrix.cloud_provider }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform/${{ matrix.cloud_provider }}
        run: terraform validate

      - name: terraform fmt check
        working-directory: terraform/${{ matrix.cloud_provider }}
        run: terraform fmt -check -diff

  validate-remote:
    name: Terraform validate (remote backend)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - security-scan-gate
      - checkov
      - terraform-validate-static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      AZURE_TF_STATE_RESOURCE_GROUP: ${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}
      AZURE_TF_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}
      AZURE_TF_STATE_CONTAINER: ${{ vars.AZURE_TF_STATE_CONTAINER }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Configure cloud provider
        id: cloud
        uses: ./.github/actions/terraform-cloud-setup
        with:
          cloud_provider: ${{ env.CLOUD_PROVIDER }}
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform init -reconfigure ${{ steps.cloud.outputs.backend_args }}

      - name: terraform validate
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform validate

      - name: terraform fmt check
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform fmt -check -diff

  plan:
    name: Terraform plan
    if: ${{ github.event_name == 'workflow_dispatch' && vars.TERRAFORM_OPERATION != 'destroy' }}
    needs:
      - validate-remote
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      AZURE_TF_STATE_RESOURCE_GROUP: ${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}
      AZURE_TF_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}
      AZURE_TF_STATE_CONTAINER: ${{ vars.AZURE_TF_STATE_CONTAINER }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Configure cloud provider
        id: cloud
        uses: ./.github/actions/terraform-cloud-setup
        with:
          cloud_provider: ${{ env.CLOUD_PROVIDER }}
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform init -reconfigure ${{ steps.cloud.outputs.backend_args }}

      - name: terraform workspace select
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        env:
          WORKSPACE: ${{ steps.cloud.outputs.workspace }}
        run: |
          set -eu
          if ! terraform workspace list | grep -q "${WORKSPACE}"; then
            terraform workspace new "${WORKSPACE}"
          else
            terraform workspace select "${WORKSPACE}"
          fi
          echo "Current workspace: $(terraform workspace show)"

      - name: terraform plan
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: |
          set -eu
          terraform plan \
            --var-file="./tfvars_files/${TARGET_ENVIRONMENT}.tfvars" \
            -var project_name="${PROJECT_NAMESPACE}" \
            -out=tfplan
          terraform show -json tfplan > plan.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tfplan-${{ env.CLOUD_PROVIDER }}-${{ env.TARGET_ENVIRONMENT }}
          path: |
            terraform/${{ env.CLOUD_PROVIDER }}/tfplan
            terraform/${{ env.CLOUD_PROVIDER }}/plan.json
          retention-days: 7
          if-no-files-found: error

  apply:
    name: Terraform apply
    if: ${{ github.event_name == 'workflow_dispatch' && vars.TERRAFORM_OPERATION != 'destroy' }}
    needs: plan
    environment: ${{ vars.ENVIRONMENT || 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      AZURE_TF_STATE_RESOURCE_GROUP: ${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}
      AZURE_TF_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}
      AZURE_TF_STATE_CONTAINER: ${{ vars.AZURE_TF_STATE_CONTAINER }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Configure cloud provider
        id: cloud
        uses: ./.github/actions/terraform-cloud-setup
        with:
          cloud_provider: ${{ env.CLOUD_PROVIDER }}
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform init -reconfigure ${{ steps.cloud.outputs.backend_args }}

      - name: terraform workspace select
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        env:
          WORKSPACE: ${{ steps.cloud.outputs.workspace }}
        run: |
          set -eu
          if ! terraform workspace list | grep -q "${WORKSPACE}"; then
            terraform workspace new "${WORKSPACE}"
          else
            terraform workspace select "${WORKSPACE}"
          fi
          echo "Current workspace: $(terraform workspace show)"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tfplan-${{ env.CLOUD_PROVIDER }}-${{ env.TARGET_ENVIRONMENT }}
          path: terraform/${{ env.CLOUD_PROVIDER }}

      - name: terraform apply
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform apply -auto-approve tfplan

  destroy:
    name: Terraform destroy
    if: ${{ github.event_name == 'workflow_dispatch' && vars.TERRAFORM_OPERATION == 'destroy' && vars.CONFIRM_DESTROY == format('destroy-{0}-{1}', vars.CLOUD_PROVIDER || 'aws', vars.ENVIRONMENT || 'dev') }}
    needs:
      - validate-remote
    environment: ${{ vars.ENVIRONMENT || 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      AZURE_TF_STATE_RESOURCE_GROUP: ${{ vars.AZURE_TF_STATE_RESOURCE_GROUP }}
      AZURE_TF_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_TF_STATE_STORAGE_ACCOUNT }}
      AZURE_TF_STATE_CONTAINER: ${{ vars.AZURE_TF_STATE_CONTAINER }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Configure cloud provider
        id: cloud
        uses: ./.github/actions/terraform-cloud-setup
        with:
          cloud_provider: ${{ env.CLOUD_PROVIDER }}
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: terraform init -reconfigure ${{ steps.cloud.outputs.backend_args }}

      - name: terraform workspace select
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        env:
          WORKSPACE: ${{ steps.cloud.outputs.workspace }}
        run: |
          set -eu
          if ! terraform workspace list | grep -q "${WORKSPACE}"; then
            echo "Workspace ${WORKSPACE} does not exist. Cannot destroy a non-existent workspace." >&2
            exit 1
          fi
          terraform workspace select "${WORKSPACE}"
          echo "Current workspace: $(terraform workspace show)"

      - name: terraform destroy
        working-directory: terraform/${{ env.CLOUD_PROVIDER }}
        run: |
          terraform destroy -auto-approve \
            --var-file="./tfvars_files/${TARGET_ENVIRONMENT}.tfvars"
